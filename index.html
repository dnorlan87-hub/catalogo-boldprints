<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bold Prints Nicaragua - Catálogo</title>
  <style>
    :root {
      --bg: #f6f7fb; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
      --line: #e5e7eb; --dark: #111827; --soft: #f3f4f6; --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 20px; }

    /* HEADER */
    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
    .brand-wrap { display: flex; align-items: center; gap: 14px; }
    .brand-logo { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; border: 1px solid var(--line); }
    .search-box { background: #fff; border: 2px solid var(--line); border-radius: 12px; padding: 8px 14px; display: flex; align-items: center; min-width: 300px; }
    .search-box input { border: 0; outline: none; width: 100%; padding: 5px; }
    .search-box button { border: 0; background: transparent; cursor: pointer; font-size: 18px; }

    /* NAVEGACIÓN */
    .nav-shell { background: #fff; border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--line); }
    .nav-top { display: flex; flex-wrap: wrap; gap: 10px; }
    .menu-item { position: relative; }
    .menu-btn { border: 1px solid var(--line); background: #fff; border-radius: 50px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
    .menu-btn.active { background: var(--dark); color: #fff; }
    .dropdown {
      position: absolute; top: 110%; left: 0; min-width: 220px; background: #fff;
      border: 1px solid var(--line); border-radius: 12px; padding: 12px; display: none; z-index: 999;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    .menu-item.open .dropdown { display: block; }
    .subcat-btn { border: 0; background: transparent; display: block; width: 100%; text-align: left; padding: 6px 0; cursor: pointer; font-size: 14px; }
    .subcat-btn.active { font-weight: 800; color: var(--accent); }

    /* LAYOUT PRINCIPAL */
    .layout { display: grid; grid-template-columns: 1fr 400px; gap: 24px; }
    .card { background: #fff; border-radius: 20px; border: 1px solid var(--line); padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }

    /* VISTA PREVIA - CORRECCIÓN DE CENTRADO */
    .preview-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .stage {
      position: relative; width: 100%; max-width: 500px; aspect-ratio: 1/1;
      display: flex; justify-content: center; align-items: center; background: #fff;
    }
    #baseImage { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    .design-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none; z-index: 2; display: flex; justify-content: center; align-items: center;
    }
    #designImage { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; opacity: 0.9; }

    /* GALERÍA CON SCROLL HORIZONTAL */
    .gallery-grid {
      display: flex; gap: 12px; margin-top: 20px; overflow-x: auto; 
      padding: 10px 5px; width: 100%; scroll-behavior: smooth;
    }
    .gallery-grid::-webkit-scrollbar { height: 6px; }
    .gallery-grid::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    .thumb {
      flex: 0 0 115px; /* Evita que se encojan */
      border: 1px solid var(--line); border-radius: 12px; padding: 10px; cursor: pointer; background: #fff; text-align: center;
    }
    .thumb.active { border-color: var(--dark); border-width: 2px; }
    .thumb-img { width: 100%; height: 80px; display: flex; justify-content: center; align-items: center; overflow: hidden; margin-bottom: 6px; }
    .thumb-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .thumb .code-label { font-size: 10px; font-weight: 800; color: var(--accent); display: block; }
    .thumb .name-label { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

    /* CARRITO Y PRECIOS */
    .cart-bar { background: var(--dark); color: #fff; border-radius: 14px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .price { font-size: 32px; font-weight: 800; margin: 15px 0; color: var(--dark); }
    .summary-box { background: var(--soft); padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; margin-bottom: 15px; border: 1px dashed #cbd5e1; }
    .option-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
    .size-btn, .swatch { border: 1px solid var(--line); background: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .size-btn.active, .swatch.active { background: var(--dark); color: #fff; }

    .btn { border: 0; border-radius: 10px; padding: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 10px; }
    .btn-primary { background: var(--dark); color: #fff; }
    .btn-cart { background: #fff; color: var(--dark); border: 1px solid var(--dark); }
    .floating-whatsapp { position: fixed; right: 20px; bottom: 20px; background: #25D366; color: #fff; border: 0; border-radius: 50px; padding: 15px 25px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; }

    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .header { flex-direction: column; align-items: flex-start; } .search-box { width: 100%; } }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="header">
      <div class="brand-wrap">
        <img class="brand-logo" src="img/logo.jpg" alt="Logo">
        <div>
          <h1 style="margin:0; font-size: 24px;">Bold Prints Nicaragua</h1>
          <p style="margin:0; color: var(--muted); font-size: 14px;">Personalización de alta calidad</p>
        </div>
      </div>
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Buscar por código o nombre..." />
        <button id="searchButton" type="button">🔎</button>
      </div>
    </div>

    <div class="nav-shell">
      <div class="nav-top" id="productMenus"></div>
    </div>

    <div class="cart-bar">
      <div><strong>CARRITO:</strong> <span id="cartCount">0</span> productos - <span id="cartTotal">C$ 0</span></div>
      <div id="cartStatus" style="font-size: 12px; opacity: 0.8;">Lista para enviar</div>
    </div>

    <div class="layout">
      <div class="card">
        <div class="preview-layout">
          <div class="stage">
            <img id="baseImage" src="img/camiseta-blanca.png">
            <div class="design-overlay" id="designOverlay">
              <img id="designImage" src="">
            </div>
          </div>
        </div>
        <div class="gallery-grid" id="designGallery"></div>
      </div>

      <div class="card">
        <h3 id="mainTitle">Configuración</h3>
        <p id="currentRoute" style="color:var(--muted); font-size:13px;"></p>
        
        <div class="summary-box" id="summary">
          Selecciona un diseño para ver los detalles.
        </div>

        <div>
          <p style="font-weight:700; font-size:14px; margin-bottom:8px;">Talla / Tamaño:</p>
          <div class="option-row" id="sizeOptions"></div>
        </div>

        <div>
          <p style="font-weight:700; font-size:14px; margin-bottom:8px;">Color Base:</p>
          <div class="option-row" id="colorOptions"></div>
        </div>

        <div class="price" id="priceLabel">C$ 0</div>
        
        <button class="btn btn-cart" id="addToCartBtn">Agregar al Carrito</button>
        <button class="btn btn-primary" id="whatsappBtn">Pedir Ahora por WhatsApp</button>
        <button class="btn" id="sendCartBtn" style="background:#25D366; color:#fff;">Enviar Carrito Completo</button>
      </div>
    </div>
  </div>

  <button class="floating-whatsapp" id="floatingWhatsappBtn">Chatear con nosotros</button>

  <script>
    // --- BASE DE DATOS (Agrega aquí tus códigos) ---
    const productCatalog = {
      'Camisetas': {
        base: { colors: { 'Blanco': 'img/camiseta-blanca.png', 'Negro': 'img/camiseta-negra.png' } },
        designStyle: { width: '35%', height: '30%', top: '42%', left: '50%' },
        categories: ['Huntrix', 'Anime', 'Capibara']
      },
      'Tazas': {
        base: { colors: { 'Blanco': 'img/taza-blanca.png' } },
        designStyle: { width: '0%', height: '0%', top: '0%', left: '0%' }, // No overlay para tazas completas
        categories: ['Capibara', 'Frases']
      }
    };

    const designsDB = [
      { code: 'HNT-01', name: 'Huntrix Neon', subcategory: 'Huntrix', image: 'img/diseno1.png', price: 450, products: ['Camisetas'] },
      { code: 'CAP-01', name: 'Capibara Love 1', subcategory: 'Capibara', image: 'img/taza-capibara-love1.jpg', price: 150, products: ['Tazas'] },
      { code: 'CAP-02', name: 'Capibara Love 2', subcategory: 'Capibara', image: 'img/taza-capibara-love2.jpg', price: 150, products: ['Tazas'] },
      { code: 'CAP-03', name: 'Capibara Love 3', subcategory: 'Capibara', image: 'img/taza-capibara-love3.jpg', price: 150, products: ['Tazas'] },
      { code: 'CAP-04', name: 'Capibara Love 4', subcategory: 'Capibara', image: 'img/taza-capibara-love4.jpg', price: 150, products: ['Tazas'] },
      { code: 'ANM-01', name: 'Gojo Satoru', subcategory: 'Anime', image: 'img/diseno6.png', price: 450, products: ['Camisetas'] }
    ];

    let state = { product: 'Camisetas', sub: 'Huntrix', design: designsDB[0], color: 'Blanco', size: 'M', qty: 1 };
    let cart = [];

    // --- RENDERIZADO ---
    function renderAll() {
      const config = productCatalog[state.product];
      
      // Menú
      const menuContainer = document.getElementById('productMenus');
      menuContainer.innerHTML = Object.keys(productCatalog).map(p => `
        <div class="menu-item ${state.product === p ? 'open' : ''}">
          <button class="menu-btn ${state.product === p ? 'active' : ''}" onclick="changeProduct('${p}')">${p}</button>
          <div class="dropdown">
            ${productCatalog[p].categories.map(c => `<button class="subcat-btn ${state.sub === c && state.product === p ? 'active' : ''}" onclick="changeSub('${p}', '${c}')">${c}</button>`).join('')}
          </div>
        </div>
      `).join('');

      // Galería con Código
      const gallery = document.getElementById('designGallery');
      const filtered = designsDB.filter(d => d.subcategory === state.sub && d.products.includes(state.product));
      gallery.innerHTML = filtered.map(d => `
        <div class="thumb ${state.design.code === d.code ? 'active' : ''}" onclick="selectDesign('${d.code}')">
          <div class="thumb-img"><img src="${d.image}"></div>
          <span class="code-label">${d.code}</span>
          <span class="name-label">${d.name}</span>
        </div>
      `).join('');

      // Opciones
      document.getElementById('sizeOptions').innerHTML = (state.product === 'Tazas' ? ['11 oz'] : ['S','M','L','XL']).map(s => `<button class="size-btn ${state.size === s ? 'active' : ''}" onclick="state.size='${s}'; renderAll()">${s}</button>`).join('');
      document.getElementById('colorOptions').innerHTML = Object.keys(config.base.colors).map(c => `<button class="swatch ${state.color === c ? 'active' : ''}" onclick="state.color='${c}'; renderAll()">${c}</button>`).join('');

      updatePreview();
    }

    function updatePreview() {
      const config = productCatalog[state.product];
      const designOverlay = document.getElementById('designOverlay');
      
      // Imagen Principal
      if (state.product === 'Tazas') {
        document.getElementById('baseImage').src = state.design.image;
        designOverlay.style.display = 'none';
      } else {
        document.getElementById('baseImage').src = config.base.colors[state.color];
        document.getElementById('designImage').src = state.design.image;
        designOverlay.style.display = 'flex';
        designOverlay.style.width = config.designStyle.width;
        designOverlay.style.height = config.designStyle.height;
        designOverlay.style.top = config.designStyle.top;
        designOverlay.style.left = config.designStyle.left;
      }

      // Resumen con Código
      document.getElementById('priceLabel').innerText = `C$ ${state.design.price}`;
      document.getElementById('summary').innerHTML = `
        <strong style="color:var(--accent)">CÓDIGO: [${state.design.code}]</strong><br>
        <strong>Producto:</strong> ${state.product}<br>
        <strong>Diseño:</strong> ${state.design.name}<br>
        <strong>Color:</strong> ${state.color} | <strong>Talla:</strong> ${state.size}
      `;
    }

    // --- ACCIONES ---
    function changeProduct(p) { state.product = p; state.sub = productCatalog[p].categories[0]; resetDesign(); renderAll(); }
    function changeSub(p, c) { state.product = p; state.sub = c; resetDesign(); renderAll(); }
    function resetDesign() { state.design = designsDB.find(d => d.subcategory === state.sub && d.products.includes(state.product)) || designsDB[0]; }
    function selectDesign(code) { state.design = designsDB.find(d => d.code === code); renderAll(); }

    // CARRITO
    document.getElementById('addToCartBtn').onclick = () => {
      cart.push({
        code: state.design.code,
        product: state.product,
        name: state.design.name,
        total: state.design.price,
        details: `Color: ${state.color}, Talla: ${state.size}`
      });
      updateCartUI();
      alert("¡Producto agregado al carrito!");
    };

    function updateCartUI() {
      document.getElementById('cartCount').innerText = cart.length;
      const total = cart.reduce((acc, item) => acc + item.total, 0);
      document.getElementById('cartTotal').innerText = `C$ ${total}`;
    }

    // WHATSAPP (CONSTRUCCIÓN DE MENSAJE COMPLETO)
    function buildMsg(isFullCart) {
      const phone = "50585807985";
      let text = "";
      
      if (isFullCart && cart.length > 0) {
        text = "Hola Bold Prints! Quiero pedir estos productos de mi carrito:%0A%0A";
        cart.forEach((item, i) => {
          text += `${i+1}. [${item.code}] ${item.product} - ${item.name}%0A   ${item.details}%0A   Precio: C$ ${item.total}%0A%0A`;
        });
        const total = cart.reduce((acc, item) => acc + item.total, 0);
        text += `*TOTAL A PAGAR: C$ ${total}*`;
      } else {
        text = `Hola Bold Prints! Quiero pedir este producto:%0A- Código: [${state.design.code}]%0A- Producto: ${state.product}%0A- Diseño: ${state.design.name}%0A- Detalle: ${state.color}, Talla ${state.size}%0A- Precio: C$ ${state.design.price}`;
      }
      window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
    }

    document.getElementById('whatsappBtn').onclick = () => buildMsg(false);
    document.getElementById('sendCartBtn').onclick = () => buildMsg(true);
    document.getElementById('floatingWhatsappBtn').onclick = () => buildMsg(cart.length > 0);

    // BUSCADOR
    document.getElementById('searchButton').onclick = () => {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const found = designsDB.find(d => d.code.toLowerCase().includes(q) || d.name.toLowerCase().includes(q));
      if (found) {
        state.product = found.products[0];
        state.sub = found.subcategory;
        state.design = found;
        renderAll();
      } else { alert("No se encontró ningún producto con ese código o nombre."); }
    };

    // Cierre de menús
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.menu-item')) document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('open'));
    });

    renderAll();
  </script>
</body>
</html>
