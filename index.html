<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bold Prints Nicaragua</title>
  <style>
    :root {
      --bg: #f6f7fb; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
      --line: #e5e7eb; --dark: #111827; --soft: #f3f4f6;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 20px; }

    /* HEADER ORIGINAL */
    .header { display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center; margin-bottom: 18px; }
    .brand-wrap { display: flex; align-items: center; gap: 14px; }
    .brand-logo { width: 72px; height: 72px; object-fit: cover; border-radius: 16px; border: 1px solid var(--line); background: #fff; box-shadow: 0 8px 20px rgba(0,0,0,.08); }
    .brand h1 { margin: 0 0 6px; font-size: 34px; }
    .brand p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.4; }
    
    .search-box { width: min(420px, 100%); background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; }
    .search-box input { border: 0; outline: none; width: 100%; font-size: 15px; background: transparent; }

    /* NAV */
    .nav-shell { background: #efefef; border-radius: 22px; padding: 18px 20px; margin-bottom: 22px; position: relative; }
    .nav-top { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .menu-item { position: relative; }
    .menu-btn { border: 0; background: #fff; color: var(--dark); border-radius: 999px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
    .menu-btn.active { background: var(--dark); color: #fff; }
    .dropdown { position: absolute; top: calc(100% + 10px); left: 0; min-width: 240px; background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 14px; box-shadow: 0 20px 40px rgba(0,0,0,.12); display: none; z-index: 999; }
    .menu-item.open .dropdown { display: block; }
    .subcat-btn { border: 0; background: transparent; text-align: left; padding: 5px 0; font-size: 14px; color: #374151; cursor: pointer; display: block; width: 100%; }
    .subcat-btn.active { color: var(--dark); font-weight: 700; }

    /* LAYOUT ORIGINAL */
    .layout { display: grid; grid-template-columns: 1.1fr .9fr; gap: 24px; align-items: start; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 22px; box-shadow: 0 10px 28px rgba(0,0,0,.06); overflow: hidden; }
    .preview, .panel, .results-card { padding: 22px; }

    /* VISTA PREVIA CON RIELES */
    .preview-layout { display: grid; grid-template-columns: 140px 1fr; gap: 18px; align-items: start; }
    .asset-rail { display: flex; flex-direction: column; gap: 12px; }
    .asset-card { position: relative; border: 1px solid var(--line); border-radius: 16px; background: #fff; padding: 10px; cursor: pointer; text-align: center; }
    .asset-card img { width: 100%; display: block; border-radius: 10px; object-fit: contain; background: #fafafa; }
    .asset-label { display: block; font-size: 12px; margin-top: 8px; color: var(--muted); font-weight: 700; }

    .stage { position: relative; width: 100%; border-radius: 18px; background: linear-gradient(180deg, #ffffff 0%, #f0f2f7 100%); border: 1px solid var(--line); display: flex; justify-content: center; align-items: center; overflow: hidden; aspect-ratio: 1/1; }
    .product-shell { position: relative; width: 80%; display: flex; justify-content: center; align-items: center; }
    .base-real { width: 100%; display: block; object-fit: contain; filter: drop-shadow(0 18px 22px rgba(0,0,0,.14)); }
    
    /* FIX CENTRADO DISEÑO */
    .design-overlay { 
      position: absolute; top: 50%; left: 50%; 
      transform: translate(-50%, -50%); /* El fix para centrar */
      display: flex; justify-content: center; align-items: center; pointer-events: none; z-index: 2; 
    }
    #designImage { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; opacity: 0.88; }

    /* GALERÍA CON SCROLL HORIZONTAL FIX */
    .gallery-grid { 
      display: flex; gap: 12px; margin-top: 16px; 
      overflow-x: auto; padding-bottom: 12px; scroll-behavior: smooth;
      width: 100%;
    }
    .gallery-grid::-webkit-scrollbar { height: 6px; }
    .gallery-grid::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    .thumb { flex: 0 0 110px; border: 1px solid var(--line); border-radius: 14px; padding: 10px; background: #fff; cursor: pointer; transition: .2s ease; text-align: center; }
    .thumb.active { border-color: var(--dark); border-width: 2px; }
    .thumb-img { width: 100%; height: 74px; margin-bottom: 8px; border-radius: 12px; display: flex; justify-content: center; align-items: center; border: 1px solid var(--line); overflow: hidden; background: #fff; }
    .thumb-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .thumb .code-tag { font-size: 10px; font-weight: 800; color: #2563eb; display: block; margin-bottom: 2px; }
    .thumb .name-tag { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

    /* CARRITO Y PANEL */
    .cart-bar { background: #111827; color: #fff; border-radius: 18px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .price { font-size: 28px; font-weight: 700; margin: 8px 0 18px; }
    .summary { background: #f9fafb; border: 1px dashed #d1d5db; border-radius: 16px; padding: 14px; margin-top: 18px; font-size: 14px; line-height: 1.6; }
    .option-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .pill, .swatch, .size-btn { border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 10px 14px; cursor: pointer; font-size: 14px; }
    .pill.active, .swatch.active, .size-btn.active { background: var(--dark); color: #fff; }

    .btn { border: 0; border-radius: 14px; padding: 13px 16px; cursor: pointer; font-weight: 700; width: 100%; margin-bottom: 8px; }
    .btn-primary { background: var(--dark); color: #fff; }
    .floating-whatsapp { position: fixed; right: 20px; bottom: 20px; background: #25D366; color: #fff; border: 0; border-radius: 999px; padding: 14px 25px; font-weight: 700; box-shadow: 0 14px 30px rgba(0,0,0,0.1); cursor: pointer; z-index: 1000; }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="header">
      <div class="brand-wrap">
        <img class="brand-logo" src="img/logo.jpg" alt="Logo">
        <div class="brand">
          <h1>Bold Prints Nicaragua</h1>
          <p>Explora productos, categorías y diseños disponibles en camisetas, tazas y más.</p>
        </div>
      </div>
      <div class="search-box">
        <button id="searchButton" style="border:0;background:transparent;cursor:pointer;font-size:18px;">🔎</button>
        <input id="searchInput" type="text" placeholder="Buscar por código o nombre..." />
      </div>
    </div>

    <div class="nav-shell">
      <div class="nav-top" id="productMenus"></div>
    </div>

    <div class="cart-bar">
      <div><strong>Carrito:</strong> <span id="cartCount">0</span> productos - <span id="cartTotal">C$ 0</span></div>
      <div style="display:flex; gap:8px;">
        <button class="menu-btn" onclick="addCurrentProductToCart()" style="font-size:12px; padding:5px 12px;">Agregar al carrito</button>
        <button class="menu-btn" onclick="sendWhatsApp(true)" style="font-size:12px; padding:5px 12px; background:#25D366; color:#fff; border:0;">Enviar WhatsApp</button>
      </div>
    </div>

    <div class="layout">
      <div class="card preview">
        <div class="preview-layout">
          <div class="asset-rail">
            <div class="asset-card">
              <img id="productThumb" src="img/camiseta-blanca.png">
              <span class="asset-label">Producto</span>
            </div>
            <div class="asset-card">
              <img id="designThumb" src="">
              <span class="asset-label">Diseño</span>
            </div>
          </div>
          <div>
            <div class="stage">
              <div class="product-shell">
                <img id="baseImage" class="base-real" src="img/camiseta-blanca.png">
                <div class="design-overlay" id="designOverlay">
                  <img id="designImage" src="">
                </div>
              </div>
            </div>
            <div class="gallery-grid" id="designGallery"></div>
          </div>
        </div>
      </div>

      <div class="card panel">
        <h3>Configuración</h3>
        <p id="currentRoute" style="font-size:13px; color:var(--muted);"></p>
        
        <div class="summary" id="summary"></div>

        <div style="margin-top:20px;">
          <p style="font-weight:700; font-size:14px; margin-bottom:8px;">Talla / Tamaño:</p>
          <div class="option-row" id="sizeOptions"></div>
        </div>

        <div style="margin-top:15px;">
          <p style="font-weight:700; font-size:14px; margin-bottom:8px;">Color:</p>
          <div class="option-row" id="colorOptions"></div>
        </div>

        <div class="price" id="priceLabel">C$ 0</div>

        <button class="btn btn-primary" id="whatsappBtn">Pedir por WhatsApp</button>
      </div>
    </div>
  </div>

  <button class="floating-whatsapp" id="floatingWhatsappBtn">WhatsApp Directo</button>

  <script>
    const productCatalog = {
      'Camisetas': {
        base: { colors: { 'Blanco': 'img/camiseta-blanca.png', 'Negro': 'img/camiseta-negra.png' } },
        designStyle: { width: '35%', height: '30%', top: '42%', left: '50%' },
        categories: ['Huntrix', 'Anime', 'Capibara']
      },
      'Tazas': {
        base: { colors: { 'Blanco': 'img/taza-blanca.png' } },
        designStyle: { width: '0%', height: '0%', top: '0%', left: '0%' }, // Para tazas que ya traen diseño
        categories: ['Capibara', 'Frases']
      }
    };

    const designsDB = [
      { code: 'CAP-01', name: 'Capibara Love 1', subcategory: 'Capibara', image: 'img/taza-capibara-love1.jpg', price: 150, products: ['Tazas'] },
      { code: 'CAP-02', name: 'Capibara Love 2', subcategory: 'Capibara', image: 'img/taza-capibara-love2.jpg', price: 150, products: ['Tazas'] },
      { code: 'ANM-01', name: 'Gojo Satoru', subcategory: 'Anime', image: 'img/diseno1.png', price: 350, products: ['Camisetas'] }
    ];

    let state = { product: 'Camisetas', sub: 'Anime', design: designsDB[2], color: 'Blanco', size: 'M' };
    let cart = [];

    function renderAll() {
      // Nav
      const menuContainer = document.getElementById('productMenus');
      menuContainer.innerHTML = Object.keys(productCatalog).map(p => `
        <div class="menu-item">
          <button class="menu-btn ${state.product === p ? 'active' : ''}" onclick="changeProduct('${p}')">${p}</button>
        </div>
      `).join('');

      // Galería
      const gallery = document.getElementById('designGallery');
      const filtered = designsDB.filter(d => d.products.includes(state.product));
      gallery.innerHTML = filtered.map(d => `
        <div class="thumb ${state.design.code === d.code ? 'active' : ''}" onclick="selectDesign('${d.code}')">
          <div class="thumb-img"><img src="${d.image}"></div>
          <span class="code-tag">${d.code}</span>
          <span class="name-tag">${d.name}</span>
        </div>
      `).join('');

      // Opciones
      document.getElementById('sizeOptions').innerHTML = (state.product === 'Tazas' ? ['11 oz'] : ['S','M','L','XL']).map(s => `<button class="size-btn ${state.size === s ? 'active' : ''}" onclick="state.size='${s}'; renderAll()">${s}</button>`).join('');
      document.getElementById('colorOptions').innerHTML = Object.keys(productCatalog[state.product].base.colors).map(c => `<button class="swatch ${state.color === c ? 'active' : ''}" onclick="state.color='${c}'; renderAll()">${c}</button>`).join('');

      updatePreview();
    }

    function updatePreview() {
      const config = productCatalog[state.product];
      const overlay = document.getElementById('designOverlay');
      
      if (state.product === 'Tazas') {
        document.getElementById('baseImage').src = state.design.image;
        overlay.style.display = 'none';
      } else {
        document.getElementById('baseImage').src = config.base.colors[state.color];
        document.getElementById('designImage').src = state.design.image;
        overlay.style.display = 'flex';
        overlay.style.width = config.designStyle.width;
        overlay.style.height = config.designStyle.height;
        overlay.style.top = config.designStyle.top;
        overlay.style.left = config.designStyle.left;
      }

      document.getElementById('productThumb').src = document.getElementById('baseImage').src;
      document.getElementById('designThumb').src = state.design.image;
      document.getElementById('priceLabel').innerText = `C$ ${state.design.price}`;
      document.getElementById('currentRoute').innerText = `${state.product} / ${state.design.subcategory}`;
      
      document.getElementById('summary').innerHTML = `
        <strong style="color:#2563eb">CÓDIGO: [${state.design.code}]</strong><br>
        <strong>Producto:</strong> ${state.product}<br>
        <strong>Diseño:</strong> ${state.design.name}<br>
        <strong>Detalle:</strong> Color ${state.color}, Talla ${state.size}
      `;
    }

    function changeProduct(p) { state.product = p; state.design = designsDB.find(d => d.products.includes(p)); renderAll(); }
    function selectDesign(code) { state.design = designsDB.find(d => d.code === code); renderAll(); }

    function addCurrentProductToCart() {
      cart.push({ ...state, total: state.design.price });
      document.getElementById('cartCount').innerText = cart.length;
      document.getElementById('cartTotal').innerText = `C$ ${cart.reduce((a, b) => a + b.total, 0)}`;
    }

    function sendWhatsApp(isCart) {
      const phone = "50585807985";
      let msg = "";
      if (isCart && cart.length > 0) {
        msg = "Hola Bold Prints! Pedido de Carrito:%0A%0A";
        cart.forEach((item, i) => msg += `${i+1}. [${item.design.code}] ${item.product} - ${item.design.name} (${item.size})%0A`);
        msg += `%0ATotal: C$ ${cart.reduce((a, b) => a + b.total, 0)}`;
      } else {
        msg = `Hola Bold Prints! Quiero pedir:%0A- Código: [${state.design.code}]%0A- Producto: ${state.product}%0A- Diseño: ${state.design.name}%0A- Color: ${state.color}, Talla: ${state.size}`;
      }
      window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }

    document.getElementById('whatsappBtn').onclick = () => sendWhatsApp(false);
    document.getElementById('floatingWhatsappBtn').onclick = () => sendWhatsApp(cart.length > 0);
    
    document.getElementById('searchButton').onclick = () => {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const found = designsDB.find(d => d.code.toLowerCase().includes(q) || d.name.toLowerCase().includes(q));
      if (found) { selectDesign(found.code); } else { alert("No encontrado"); }
    };

    renderAll();
  </script>
</body>
</html>
