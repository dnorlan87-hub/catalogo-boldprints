<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bold Prints Nicaragua</title>
  <style>
    :root {
      --bg: #f6f7fb; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
      --line: #e5e7eb; --dark: #111827; --soft: #f3f4f6; --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 20px; }

    /* HEADER */
    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 18px; }
    .brand-wrap { display: flex; align-items: center; gap: 14px; }
    .brand-logo { width: 72px; height: 72px; object-fit: cover; border-radius: 16px; border: 1px solid var(--line); background: #fff; }
    .search-box { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; min-width: 300px; }
    .search-box input { border: 0; outline: none; width: 100%; font-size: 15px; }

    /* NAVEGACIÓN */
    .nav-shell { background: #efefef; border-radius: 22px; padding: 18px 20px; margin-bottom: 22px; }
    .nav-top { display: flex; flex-wrap: wrap; gap: 12px; }
    .menu-item { position: relative; }
    .menu-btn { border: 0; background: #fff; color: var(--dark); border-radius: 999px; padding: 10px 16px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
    .menu-btn.active { background: var(--dark); color: #fff; }
    .dropdown { position: absolute; top: 110%; left: 0; min-width: 240px; background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 14px; box-shadow: 0 20px 40px rgba(0,0,0,.12); display: none; z-index: 999; }
    .menu-item.open .dropdown { display: block; }
    .subcat-btn { border: 0; background: transparent; text-align: left; padding: 5px 0; display: block; width: 100%; cursor: pointer; color: #374151; }
    .subcat-btn.active { color: var(--accent); font-weight: 700; }

    /* LAYOUT Y VISTA PREVIA CORREGIDA */
    .layout { display: grid; grid-template-columns: 1.1fr .9fr; gap: 24px; align-items: start; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 22px; padding: 22px; box-shadow: 0 10px 28px rgba(0,0,0,.06); }
    
    .preview-layout {
      display: flex;
      flex-direction: column;
      align-items: center; /* Centrado absoluto */
      justify-content: center;
      width: 100%;
    }

    .stage {
      position: relative;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 1/1;
      border-radius: 18px;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .base-real { max-width: 100%; max-height: 100%; object-fit: contain; }

    .design-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%); /* Centrado matemático */
      pointer-events: none;
      z-index: 2;
    }
    #designImage { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; opacity: 0.9; }

    /* GALERÍA HORIZONTAL CORREGIDA */
    .gallery-grid {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 10px 5px;
      width: 100%;
      scroll-behavior: smooth;
    }
    .gallery-grid::-webkit-scrollbar { height: 6px; }
    .gallery-grid::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    .thumb {
      flex: 0 0 110px; /* Evita que se encojan */
      border: 1px solid var(--line); border-radius: 14px; padding: 10px; background: #fff; cursor: pointer; text-align: center;
    }
    .thumb.active { border-color: var(--dark); border-width: 2px; }
    .thumb-img { width: 100%; height: 80px; display: flex; justify-content: center; align-items: center; overflow: hidden; margin-bottom: 6px; }
    .thumb-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .thumb .code-label { font-size: 10px; font-weight: 800; color: var(--accent); display: block; }
    .thumb .name-label { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

    /* CARRITO Y ACCIONES */
    .cart-bar { background: var(--dark); color: #fff; border-radius: 18px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .price { font-size: 32px; font-weight: 800; margin: 10px 0; }
    .summary { background: #f9fafb; border: 1px dashed #d1d5db; border-radius: 16px; padding: 15px; margin-top: 15px; font-size: 14px; }
    .option-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
    .size-btn, .swatch { border: 1px solid var(--line); background: #fff; border-radius: 10px; padding: 8px 12px; cursor: pointer; font-size: 13px; }
    .size-btn.active, .swatch.active { background: var(--dark); color: #fff; }

    .btn { border: 0; border-radius: 12px; padding: 14px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 10px; }
    .btn-primary { background: var(--dark); color: #fff; }
    .floating-whatsapp { position: fixed; right: 20px; bottom: 20px; background: #25D366; color: #fff; border: 0; border-radius: 50px; padding: 15px 25px; font-weight: 700; box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer; z-index: 1000; }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="header">
      <div class="brand-wrap">
        <img class="brand-logo" src="img/logo.jpg" alt="Logo">
        <div>
          <h1 style="margin:0">Bold Prints Nicaragua</h1>
          <p style="margin:0; color:var(--muted)">Personalización de alta calidad</p>
        </div>
      </div>
      <form id="searchForm" class="search-box">
        <input id="searchInput" type="text" placeholder="Buscar por código o nombre..." />
        <button id="searchButton" type="submit">🔎</button>
      </form>
    </div>

    <div class="nav-shell">
      <div class="nav-top" id="productMenus"></div>
    </div>

    <div class="cart-bar">
      <div><strong>Carrito:</strong> <span id="cartCount">0</span> items - <span id="cartTotal">C$ 0</span></div>
      <button onclick="addCurrentProductToCart()" style="background:#fff; border:0; padding:5px 10px; border-radius:8px; cursor:pointer; font-weight:700;">Agregar</button>
    </div>

    <div class="layout">
      <div class="card">
        <div class="preview-layout">
          <div class="stage">
            <img id="baseImage" class="base-real" src="img/camiseta-blanca.png">
            <div class="design-overlay" id="designOverlay">
              <img id="designImage" src="">
            </div>
          </div>
        </div>
        <div class="gallery-grid" id="designGallery"></div>
      </div>

      <div class="card">
        <h3 id="mainTitle">Configuración</h3>
        <p id="currentRoute"></p>

        <div class="summary" id="summary"></div>

        <div style="margin-top:15px">
          <p style="font-weight:700; font-size:14px; margin-bottom:8px;">Talla / Tamaño:</p>
          <div class="option-row" id="sizeOptions"></div>
        </div>

        <div>
          <p style="font-weight:700; font-size:14px; margin-bottom:8px;">Color Base:</p>
          <div class="option-row" id="colorOptions"></div>
        </div>

        <div class="price" id="priceLabel">C$ 0</div>

        <button class="btn btn-primary" id="whatsappBtn">Pedir por WhatsApp</button>
        <button class="btn" id="sendCartBtn" style="background:#25D366; color:#fff">Enviar Carrito Completo</button>
        
        <div id="cartList" style="margin-top:20px"></div>
      </div>
    </div>
  </div>

  <button class="floating-whatsapp" id="floatingWhatsappBtn">Chatear por WhatsApp</button>

  <script>
    const productCatalog = {
      'Camisetas': {
        base: { colors: { 'Blanco': 'img/camiseta-blanca.png', 'Negro': 'img/camiseta-negra.png' } },
        designStyle: { width: '35%', height: '30%', top: '45%', left: '50%' },
        categories: ['Huntrix', 'Anime', 'Capibara']
      },
      'Tazas': {
        base: { colors: { 'Blanco': 'img/taza-blanca.png' } },
        designStyle: { width: '0%', height: '0%', top: '0%', left: '0%' },
        categories: ['Capibara', 'Frases']
      }
    };

    const designsDB = [
      { code: 'CAP-01', name: 'Capibara Love 1', subcategory: 'Capibara', image: 'img/taza-capibara-love1.jpg', price: 150, products: ['Tazas'] },
      { code: 'CAP-02', name: 'Capibara Love 2', subcategory: 'Capibara', image: 'img/taza-capibara-love2.jpg', price: 150, products: ['Tazas'] },
      { code: 'CAP-03', name: 'Capibara Love 3', subcategory: 'Capibara', image: 'img/taza-capibara-love3.jpg', price: 150, products: ['Tazas'] },
      { code: 'CAP-04', name: 'Capibara Love 4', subcategory: 'Capibara', image: 'img/taza-capibara-love4.jpg', price: 150, products: ['Tazas'] },
      { code: 'ANM-01', name: 'Gojo Satoru', subcategory: 'Anime', image: 'img/diseno1.png', price: 350, products: ['Camisetas'] }
    ];

    let state = { product: 'Camisetas', sub: 'Anime', design: designsDB[4], color: 'Blanco', size: 'M', quantity: 1 };
    let cart = [];

    function renderAll() {
      // Menú
      const menuContainer = document.getElementById('productMenus');
      menuContainer.innerHTML = Object.keys(productCatalog).map(p => `
        <div class="menu-item">
          <button class="menu-btn ${state.product === p ? 'active' : ''}" onclick="state.product='${p}'; state.sub='${productCatalog[p].categories[0]}'; renderAll()">${p}</button>
        </div>
      `).join('');

      // Galería con Código
      const gallery = document.getElementById('designGallery');
      const filtered = designsDB.filter(d => d.products.includes(state.product));
      gallery.innerHTML = filtered.map(d => `
        <div class="thumb ${state.design.code === d.code ? 'active' : ''}" onclick="selectDesign('${d.code}')">
          <div class="thumb-img"><img src="${d.image}"></div>
          <span class="code-label">${d.code}</span>
          <span class="name-label">${d.name}</span>
        </div>
      `).join('');

      // Opciones
      document.getElementById('sizeOptions').innerHTML = (state.product === 'Tazas' ? ['11 oz'] : ['S','M','L','XL']).map(s => `<button class="size-btn ${state.size === s ? 'active' : ''}" onclick="state.size='${s}'; renderAll()">${s}</button>`).join('');
      document.getElementById('colorOptions').innerHTML = Object.keys(productCatalog[state.product].base.colors).map(c => `<button class="swatch ${state.color === c ? 'active' : ''}" onclick="state.color='${c}'; renderAll()">${c}</button>`).join('');

      updatePreview();
    }

    function selectDesign(code) {
      state.design = designsDB.find(d => d.code === code);
      renderAll();
    }

    function updatePreview() {
      const config = productCatalog[state.product];
      const overlay = document.getElementById('designOverlay');
      
      if (state.product === 'Tazas') {
        document.getElementById('baseImage').src = state.design.image;
        overlay.style.display = 'none';
      } else {
        document.getElementById('baseImage').src = config.base.colors[state.color];
        document.getElementById('designImage').src = state.design.image;
        overlay.style.display = 'block';
        overlay.style.width = config.designStyle.width;
        overlay.style.height = config.designStyle.height;
        overlay.style.top = config.designStyle.top;
        overlay.style.left = config.designStyle.left;
      }

      document.getElementById('priceLabel').innerText = `C$ ${state.design.price}`;
      document.getElementById('currentRoute').innerText = `${state.product} / ${state.design.subcategory}`;
      
      document.getElementById('summary').innerHTML = `
        <strong style="color:var(--accent)">CÓDIGO: [${state.design.code}]</strong><br>
        <strong>Diseño:</strong> ${state.design.name}<br>
        <strong>Detalle:</strong> Color ${state.color}, Talla ${state.size}
      `;
    }

    function addCurrentProductToCart() {
      cart.push({ ...state, total: state.design.price });
      updateCartUI();
    }

    function updateCartUI() {
      document.getElementById('cartCount').innerText = cart.length;
      const total = cart.reduce((acc, item) => acc + item.total, 0);
      document.getElementById('cartTotal').innerText = `C$ ${total}`;
    }

    function sendWhatsApp(isFullCart) {
      const phone = "50585807985";
      let msg = "";

      if (isFullCart && cart.length > 0) {
        msg = "Hola Bold Prints! Pedido de Carrito:%0A%0A";
        cart.forEach((item, i) => {
          msg += `${i+1}. [${item.design.code}] ${item.product} - ${item.design.name}%0A   Color: ${item.color}, Talla: ${item.size}%0A%0A`;
        });
        const total = cart.reduce((acc, item) => acc + item.total, 0);
        msg += `*TOTAL: C$ ${total}*`;
      } else {
        msg = `Hola Bold Prints! Quiero pedir:%0A- Código: [${state.design.code}]%0A- Producto: ${state.product}%0A- Diseño: ${state.design.name}%0A- Color: ${state.color}, Talla: ${state.size}%0A- Precio: C$ ${state.design.price}`;
      }
      window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }

    document.getElementById('whatsappBtn').onclick = () => sendWhatsApp(false);
    document.getElementById('sendCartBtn').onclick = () => sendWhatsApp(true);
    document.getElementById('floatingWhatsappBtn').onclick = () => sendWhatsApp(cart.length > 0);

    // Buscador
    document.getElementById('searchForm').onsubmit = (e) => {
      e.preventDefault();
      const q = document.getElementById('searchInput').value.toLowerCase();
      const found = designsDB.find(d => d.code.toLowerCase().includes(q) || d.name.toLowerCase().includes(q));
      if (found) { selectDesign(found.code); } else { alert("No se encontró el código."); }
    };

    renderAll();
  </script>
</body>
</html>
