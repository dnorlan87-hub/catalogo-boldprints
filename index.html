<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bold Prints Nicaragua</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --dark: #111827;
      --soft: #f3f4f6;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1320px; margin: 0 auto; padding: 20px; }

    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }
    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand-logo {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
      flex-shrink: 0;
    }
    .brand h1 { margin: 0 0 6px; font-size: 34px; }
    .brand p { margin: 0; color: var(--muted); }
    .search-box {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-box input {
      border: 0;
      outline: none;
      width: 100%;
      font-size: 15px;
      background: transparent;
    }

    .nav-shell {
      background: #efefef;
      border-radius: 22px;
      padding: 18px 20px;
      margin-bottom: 22px;
      position: relative;
    }
    .nav-top {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .menu-item { position: relative; }
    .menu-btn {
      border: 0;
      background: #fff;
      color: var(--dark);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .menu-btn.active { background: var(--dark); color: #fff; }
    .dropdown {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      min-width: 240px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,.12);
      display: none;
      z-index: 999;
    }
    .menu-item.open .dropdown { display: block; }
    .dropdown h4 {
      margin: 0 0 10px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: .3px;
    }
    .dropdown-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
    }
    .subcat-btn {
      border: 0;
      background: transparent;
      text-align: left;
      padding: 0;
      font-size: 14px;
      color: #374151;
      cursor: pointer;
    }
    .subcat-btn:hover,
    .subcat-btn.active { color: var(--dark); font-weight: 700; }

    .layout {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 24px;
      align-items: start;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 10px 28px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .preview, .panel, .results-card { padding: 22px; }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .section-head h2, .section-head h3 {
      margin: 0;
      font-size: 24px;
    }
    .muted { color: var(--muted); font-size: 14px; }

    .preview-layout {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 18px;
      align-items: start;
    }
    .asset-rail { display: flex; flex-direction: column; gap: 12px; }
    .asset-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 10px;
      cursor: pointer;
    }
    .asset-card img { width: 100%; display: block; border-radius: 10px; object-fit: contain; background: #fafafa; }
    .asset-label { display: block; font-size: 12px; margin-top: 8px; color: var(--muted); text-align: center; font-weight: 700; }
    .asset-zoom {
      position: absolute;
      left: 118%; top: 50%; transform: translateY(-50%) scale(.96);
      width: 220px; padding: 12px; border-radius: 18px; border: 1px solid var(--line);
      background: #fff; box-shadow: 0 18px 36px rgba(0,0,0,.16);
      opacity: 0; visibility: hidden; transition: .2s ease; pointer-events: none; z-index: 5;
    }
    .asset-card:hover .asset-zoom { opacity: 1; visibility: visible; transform: translateY(-50%) scale(1); }
    .asset-zoom img { width: 100%; max-height: 220px; object-fit: contain; }

    .stage {
      position: relative;
      width: 100%;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f0f2f7 100%);
      border: 1px solid var(--line);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .product-shell {
      position: relative;
      width: 70%;
      max-width: 400px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .base-real { width: 100%;
      display: block;
      object-fit: contain;
      object-position: center; filter: drop-shadow(0 18px 22px rgba(0,0,0,.14)); }
    .design-overlay {
      position: absolute;
      width: 26%; height: 26%; top: 50%; left: 50%; transform: translateX(-50%, -50%);
      display: grid; place-items: center; pointer-events: none; z-index: 2;
    }
    #designImage {
      width: 100%; height: 100%; object-fit: contain; display: block;
      opacity: 0.88; mix-blend-mode: multiply; filter: saturate(0.95) contrast(0.95);
    }

    /* GALERÍA HORIZONTAL CORREGIDA */
    .gallery-grid {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 10px; /* Espacio para el scroll */
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* ESTILO DE SCROLLBAR */
    .gallery-grid::-webkit-scrollbar {
      height: 6px;
    }
    .gallery-grid::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    .gallery-grid::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    .gallery-grid::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .thumb {
      flex: 0 0 110px; /* EVITA QUE SE ENCOJAN */
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: #fff;
      cursor: pointer;
      transition: .2s ease;
      text-align: center;
      font-size: 13px;
    }

    .thumb:hover, .thumb.active {
      border-color: var(--dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,.08);
    }
    .thumb-img {
      width: 100%; height: 74px; margin-bottom: 8px; border-radius: 12px;
      display: grid; place-items: center; border: 1px solid var(--line); overflow: hidden; background: #fff;
    }
    .thumb-img img { width: 100%; height: 100%; object-fit: contain; }

    .product-pills, .option-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .pill, .swatch, .size-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }
    .pill.active, .swatch.active, .size-btn.active { background: var(--dark); color: #fff; border-color: var(--dark); }
    .swatch-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; border: 1px solid rgba(0,0,0,.14); }
    .price { font-size: 28px; font-weight: 700; margin: 8px 0 18px; }
    .summary { background: #f9fafb; border: 1px dashed #d1d5db; border-radius: 16px; padding: 14px; margin-top: 18px; font-size: 14px; line-height: 1.6; }
    .actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .floating-whatsapp {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 1000;
      background: #25D366;
      color: #fff;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 700;
      box-shadow: 0 14px 30px rgba(37, 211, 102, .28);
      cursor: pointer;
    }

    .cart-bar {
      position: relative;
      z-index: 1;
      margin-bottom: 16px;
      background: #111827;
      color: #fff;
      border-radius: 18px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .cart-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 14px;
    }

    .cart-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .cart-btn.light {
      background: #fff;
      color: #111827;
    }

    .cart-btn.ghost {
      background: rgba(255,255,255,.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,.2);
    }

    .cart-list {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .cart-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      display: grid;
      grid-template-columns: 62px 1fr auto;
      gap: 12px;
      align-items: center;
      background: #fff;
    }

    .cart-item img {
      width: 62px;
      height: 62px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .cart-item small {
      color: var(--muted);
      display: block;
      line-height: 1.45;
    }

    .cart-remove {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn { border: 0; border-radius: 14px; padding: 13px 16px; cursor: pointer; font-weight: 700; }
    .btn-primary { background: var(--dark); color: #fff; }
    .btn-secondary { background: #eef2ff; color: var(--dark); border: 1px solid #c7d2fe; }

    .search-results {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 12px;
    }
    .result-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #fff;
      cursor: pointer;
      transition: .2s ease;
    }
    .result-item:hover { border-color: var(--dark); transform: translateY(-1px); box-shadow: 0 10px 22px rgba(0,0,0,.08); }
    .result-head { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .result-head img { width: 58px; height: 58px; object-fit: contain; border: 1px solid var(--line); border-radius: 12px; background: #fff; }
    .result-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 12px; padding: 6px 8px; border-radius: 999px; background: var(--soft); color: #374151;
    }

    @media (max-width: 980px) {
      .header, .layout, .preview-layout { grid-template-columns: 1fr; }
      .category-grid, .search-results, .sheet-products { grid-template-columns: repeat(2, 1fr); }
      .asset-rail { flex-direction: row; overflow-x: auto; }
      .asset-card { min-width: 130px; }
      .nav-top { display: grid; grid-template-columns: 1fr 1fr; }
      .search-box { width: 100%; }
    }

    img {
      -webkit-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
    }

    .thumb,
    .asset-card,
    .result-item,
    .stage {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand-wrap">
        <img class="brand-logo" src="img/logo.jpg" alt="Bold Prints Nicaragua">
        <div class="brand">
          <h1>Bold Prints Nicaragua</h1>
          <p>Explora productos, categorías y diseños disponibles.</p>
        </div>
      </div>
      <form id="searchForm" class="search-box">
        <button id="searchButton" type="submit" style="border:0;background:transparent;cursor:pointer;font-size:18px;">🔎</button>
        <input id="searchInput" type="text" placeholder="Buscar diseños..." />
      </form>
    </div>

    <div class="nav-shell">
      <div class="nav-top" id="productMenus"></div>
    </div>

    <div class="cart-bar">
      <div class="cart-meta">
        <strong>Carrito</strong>
        <span id="cartCount">0 producto(s)</span>
        <span id="cartTotal">C$ 0</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="cart-btn light" id="addToCartBtn" type="button">Agregar al carrito</button>
        <button class="cart-btn ghost" id="sendCartBtn" type="button">Enviar por WhatsApp</button>
      </div>
    </div>

    <div class="layout">
      <div class="card preview">
        <div class="section-head">
          <h2 id="mainTitle">Vista previa</h2>
        </div>
        <div class="preview-layout">
          <div class="asset-rail">
            <div class="asset-card">
              <img id="productThumb" src="img/camiseta-blanca.png" alt="Producto">
              <span class="asset-label">Producto</span>
            </div>
          </div>
          <div>
            <div class="stage">
              <div class="product-shell">
                <img id="baseImage" class="base-real" src="img/camiseta-blanca.png">
                <div class="design-overlay" id="designOverlay">
                  <img id="designImage" src="img/diseno1.png">
                </div>
              </div>
            </div>
            <div class="gallery-grid" id="designGallery"></div>
          </div>
        </div>
      </div>
      <div class="card panel">
        <h3 id="currentRoute">Configuración</h3>
        <div class="price" id="price">C$ 0</div>
        <div class="summary" id="summary"></div>
        <div class="actions">
          <button class="btn btn-primary" id="whatsappBtn">Pedir por WhatsApp</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Tu lógica de JavaScript se mantiene igual, 
    // solo asegúrate de que el renderizado de la galería no cambie los estilos CSS aplicados.
  </script>
</body>
</html>
